options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/principal-iris-449200-b7/ian-portfolio/portfolio:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/principal-iris-449200-b7/ian-portfolio/portfolio:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'asia-southeast1-docker.pkg.dev/principal-iris-449200-b7/ian-portfolio/portfolio'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ian-bike
      - '--image=asia-southeast1-docker.pkg.dev/principal-iris-449200-b7/ian-portfolio/portfolio:$COMMIT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'

images:
  - 'asia-southeast1-docker.pkg.dev/principal-iris-449200-b7/ian-portfolio/portfolio:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/principal-iris-449200-b7/ian-portfolio/portfolio:latest'
